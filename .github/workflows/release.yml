name: 'Release'

# Creates a GitHub release whenever an immutable vX.Y.Z tag is pushed.
# This action publishes immutable tags only (no floating major/minor tag is
# moved), so consumers should pin to a full semver tag or commit SHA.
on:
   push:
      tags:
         - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
   contents: write

jobs:
   release:
      name: Create GitHub release
      runs-on: ubuntu-latest
      steps:
         - name: Check out repository
           uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
           with:
              fetch-depth: 0

         - name: Verify the tag points at a built bundle
           run: |
              test -f lib/index.js || {
                echo "lib/index.js is missing at tag ${GITHUB_REF_NAME}; refusing to release."
                exit 1
              }

         - name: Extract release notes from CHANGELOG.md
           env:
              TAG: ${{ github.ref_name }}
           run: |
              awk -v tag="## ${TAG}" '
                $0 == tag { flag=1; next }
                /^## / && flag { exit }
                flag { print }
              ' CHANGELOG.md | sed '/./,$!d' > /tmp/release-notes.md
              if [ ! -s /tmp/release-notes.md ]; then
                echo "::error::No CHANGELOG.md entry found for ${TAG}." \
                  "Add a '## ${TAG}' section before tagging."
                exit 1
              fi

         - name: Create release
           env:
              GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              TAG: ${{ github.ref_name }}
           run: |
              gh release create "$TAG" \
                --title "$TAG" \
                --notes-file /tmp/release-notes.md \
                --verify-tag
