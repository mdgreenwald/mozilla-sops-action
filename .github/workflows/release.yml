name: 'Release'

# Creates a GitHub release whenever an immutable vX.Y.Z tag is pushed.
# This action publishes immutable tags only (no floating major/minor tag is
# moved), so consumers should pin to a full semver tag or commit SHA.
on:
   push:
      tags:
         - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
   contents: write

jobs:
   release:
      name: Create GitHub release
      runs-on: ubuntu-latest
      steps:
         - name: Check out repository
           uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
           with:
              fetch-depth: 0

         - name: Verify the tag points at a built bundle
           run: |
              test -f lib/index.js || {
                echo "lib/index.js is missing at tag ${GITHUB_REF_NAME}; refusing to release."
                exit 1
              }

         - name: Create release
           env:
              GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              TAG: ${{ github.ref_name }}
           run: |
              gh release create "$TAG" \
                --title "$TAG" \
                --generate-notes \
                --verify-tag
